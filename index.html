<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiningVest</title>
    <style>
        /* Removes all default browser spacing */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Fixes double-scrolling */
            background-color: #0b0e11; /* Matches the site's dark theme */
        }

        /* Forces the frame to be the exact size of the device screen */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            /* Critical for smooth scrolling on iPhones */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://miningvest.lovable.app" 
        allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

</body>
</html>

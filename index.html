<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miningvest</title>
    <style>
        /* Remove all browser defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Stops the parent page from scrolling */
            background-color: #000; /* Matches the site's dark theme */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Ensures smooth momentum scrolling on iOS */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://miningvest.lovable.app" 
        allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        loading="lazy">
    </iframe>

</body>
</html>

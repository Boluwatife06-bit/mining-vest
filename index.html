<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiningVest</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Reset margins to ensure 0px gap between the frame and the screen edge */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents the 'double-scroll' glitch */
            background-color: #0b0e11; /* Matches your site's dark theme */
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw; /* 100% of the viewport width */
            height: 100vh; /* 100% of the viewport height */
            border: none;
            display: block;
            /* Smooth momentum scrolling for iPhone/Safari */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://miningvest.lovable.app" 
        allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

</body>
</html>
